name: test
permissions:
  contents: read
  id-token: write
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@6.0.2
      - uses: actions/checkout@6.0.2
        with:
          repository: tmux-contrib/tmux-aws
          path: .tmux-aws
      - uses: DeterminateSystems/nix-installer-action@21
      - uses: DeterminateSystems/magic-nix-cache-action@13
      - run: nix develop --command bats tests/
